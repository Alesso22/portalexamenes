  {id:"f2",erronea:'=SI(A1="mayor a 50";"Aprobado";"Reprobado")',correcta:'=SI(A1>50;"Aprobado";"Reprobado")'},

function calcC5(r){
  let p=0;
  PM_C5.forEach(q=>{if(r.multiple?.[q.id]===q.correcta)p++;});

}

// ── JSONBIN ───────────────────────────────────────────
const JB_URL=()=>`https://api.jsonbin.io/v3/b/${window.JSONBIN_BIN}`;
const JB_H=()=>({"Content-Type":"application/json","X-Master-Key":window.JSONBIN_KEY,"X-Bin-Versioning":"false"});
async function fbGuardar(resp){
  try{
    const g=await fetch(JB_URL(),{headers:JB_H()});
    const d=await g.json();
    const a=Array.isArray(d.record)?d.record:[];
    await fetch(JB_URL(),{method:"PUT",headers:JB_H(),body:JSON.stringify([...a,resp])});
    return true;
  }catch(e){console.error("Error guardando:",e);return false;}
}
async function fbEscuchar(cb){
  try{
    const g=await fetch(JB_URL(),{headers:JB_H()});
    const d=await g.json();
    cb(Array.isArray(d.record)?d.record:[]);
  }catch(e){console.error("Error leyendo:",e);cb([]);}
}

function useTimer(s){
  const [t,setT]=useState(s);
  useEffect(()=>{const x=setInterval(()=>setT(p=>p>0?p-1:0),1000);return()=>clearInterval(x);},[]);
  const mm=String(Math.floor(t/60)).padStart(2,"0"),ss=String(t%60).padStart(2,"0");
  return{mm,ss,color:t<300?"#ff5050":t<600?"#ffaa00":"#00ff88"};
}

function ExamenPY({nombre,cursoId,onEnviar}){
  const c=getCurso(cursoId);
  const [sec,setSec]=useState(0);
  const [multiple,setMultiple]=useState({});
  const [vf,setVf]=useState({});
  const [ejercicios,setEjercicios]=useState({});
  const [enviado,setEnviado]=useState(false);
  const [confirm,setConfirm]=useState(false);
  const [enviando,setEnviando]=useState(false);
  const {mm,ss,color:tc}=useTimer(40*60);
  const setEj=(id,v)=>setEjercicios(p=>({...p,[id]:v}));
  const enviar=async()=>{
    setEnviando(true);
    await onEnviar({nombre,cursoId,curso:c.label,fecha:new Date().toLocaleString("es-GT"),multiple,vf,ejercicios});
    setEnviado(true);
  };
  if(enviado)return<Enviado nombre={nombre}/>;
  const tabs=["Selección Múltiple","Verdadero o Falso","Ejercicios de Código"];
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#1a1500)"}}>
      <TopBar cursoId={cursoId} nombre={nombre} mm={mm} ss={ss} timerColor={tc}/>
      <ProgBar sec={sec} total={2}/>

function Bloque({title,color,children}){return(<div style={{...card,marginBottom:12}}><div style={{fontWeight:700,fontSize:13,color,marginBottom:10,borderBottom:"1px solid rgba(255,255,255,0.08)",paddingBottom:8}}>{title}</div>{children}</div>);}
function ItemDet({num,txt,ok,resp,correcta}){return(<div style={{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:12}}><div style={{color:"rgba(255,255,255,0.7)",marginBottom:3,whiteSpace:"pre-line"}}>{num}. {txt}</div><span style={{color:ok?"#00ff88":"#ff8080"}}>{ok?"✓":"✗"} {resp}</span>{correcta&&<span style={{color:"rgba(255,255,255,0.4)",marginLeft:10}}>→ {correcta}</span>}</div>);}

lor:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>Sin respuesta</span>}</div></div>))}</Bloque></div>);}

Excel — revisar archivo" color="#ffaa00"><div style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"10px 14px",fontSize:12,lineHeight:1.8,whiteSpace:"pre-wrap",fontFamily:"monospace",color:"#00ff99"}}>{r.ejercicio||<span style={{color:"rgba(255,255,255,0.3)"}}>Sin respuesta</span>}</div></Bloque></div>);}

// ── PANEL MAESTRO ─────────────────────────────────────
function PanelMaestro({onSalir}){
  const [respuestas,setRespuestas]=useState([]);
  const [filtro,setFiltro]=useState("todos");
  const [alumnoVer,setAlumnoVer]=useState(null);
  const [cargando,setCargando]=useState(true);

  useEffect(()=>{
    fbEscuchar(d=>{setRespuestas(d);setCargando(false);});
    const t=setInterval(()=>fbEscuchar(setRespuestas),20000);
    return()=>clearInterval(t);
  },[]);

  const filtradas=filtro==="todos"?respuestas:respuestas.filter(r=>r.cursoId===filtro);

  // ✅ CORRECCIÓN CENTRAL: calcAuto usa la función correcta según cursoId
  const getAuto=r=>calcAuto(r);
  const getMax=r=>MAX_AUTO[r.cursoId]||"?";

  const verAlumno=r=>{
    // Compatibilidad con respuestas del archivo 1 (sin cursoId)
    if(!r.cursoId&&r.clase) setAlumnoVer({...r,cursoId:"lab1",curso:"4to Bach — Laboratorio I"});
    else setAlumnoVer(r);
  };

  const DetalleMap={comp1:DetalleC1,lab1:DetalleL1,prog4:DetalleP4,py5:DetallePY,comp5:DetalleC5};

  return(
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#fff"}}>
      <div style={{background:"rgba(0,0,0,0.5)",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontWeight:800,fontSize:16}}>📊 Panel del Catedrático</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Plataforma de Exámenes · {respuestas.length} respuestas</div>
        </div>
        <button onClick={onSalir} style={btn()}>← Salir</button>
      </div>
      <div style={{padding:"20px 24px"}}>
        {/* Filtros */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>{setFiltro("todos");setAlumnoVer(null);}} style={{background:filtro==="todos"?"rgba(0,212,255,0.15)":"rgba(255,255,255,0.05)",border:filtro==="todos"?"1px solid #00d4ff":"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 14px",color:filtro==="todos"?"#00d4ff":"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12}}>
            Todos ({respuestas.length})
          </button>
          {CURSOS.map(c=>(
            <button key={c.id} onClick={()=>{setFiltro(c.id);setAlumnoVer(null);}} style={{background:filtro===c.id?c.bg:"rgba(255,255,255,0.05)",border:filtro===c.id?`1px solid ${c.color}`:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 14px",color:filtro===c.id?c.color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12}}>
              {c.label} ({respuestas.filter(r=>r.cursoId===c.id).length})
            </button>
          ))}
        </div>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[
            {label:"Enviados",val:filtradas.length,color:"#00d4ff"},
            {label:"Promedio",val:filtradas.length?Math.round(filtradas.reduce((a,r)=>a+getAuto(r),0)/filtradas.length):"—",color:"#00ff88"},
            {label:"Más alto",val:filtradas.length?Math.max(...filtradas.map(r=>getAuto(r))):"—",color:"#a78bff"},
            {label:"Más bajo",val:filtradas.length?Math.min(...filtradas.map(r=>getAuto(r))):"—",color:"#ff8080"},
          ].map(s=>(
            <div key={s.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:s.color}}>{s.val}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:3}}>{s.label}</div>
            </div>
          ))}
        </div>
        {/* Contenido */}
        {cargando?(
          <div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.4)"}}>Cargando respuestas...</div>
        ):alumnoVer?(
          (() => {
            const Comp=DetalleMap[alumnoVer.cursoId];
            return Comp?<Comp r={alumnoVer} onBack={()=>setAlumnoVer(null)}/>:<div style={{color:"#ff8080"}}>Tipo de examen no reconocido.</div>;
          })()
        ):filtradas.length===0?(
          <div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:36,marginBottom:8}}>📭</div><div>Aún no hay respuestas.</div></div>
        ):(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 70px",gap:8,padding:"6px 12px",fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:700,textTransform:"uppercase"}}>
              <span>Alumno</span><span>Curso</span><span>Hora</span><span>Auto</span><span></span>
            </div>
            {filtradas.map((r,i)=>{
              // ✅ Fallback robusto para cursoId faltante o desconocido
              const c=getCurso(r.cursoId)||{color:"#aaa",label:r.curso||r.clase||"—",bg:"rgba(255,255,255,0.08)"};
              const pts=getAuto(r);
              const mx=getMax(r);
              const pct=typeof mx==="number"&&mx>0?Math.round((pts/mx)*100):0;
              return(
                <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 12px",display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 70px",gap:8,alignItems:"center",marginBottom:6}}>
                  <span style={{fontWeight:600,fontSize:13}}>{r.nombre||"—"}</span>
                  <span style={{fontSize:11,color:c.color,background:c.bg,borderRadius:6,padding:"2px 8px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.label}</span>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{(r.fecha||"").split(",")[1]||(r.fecha||"")}</span>
                  <span style={{fontSize:13,fontWeight:700,color:pct>=70?"#00ff88":pct>=50?"#ffaa00":"#ff8080"}}>{pts}/{mx}</span>
                  <button onClick={()=>verAlumno(r)} style={{...btn({padding:"5px 10px",fontSize:12}),color:"#00d4ff",borderColor:"rgba(0,212,255,0.3)",background:"rgba(0,212,255,0.1)"}}>Ver →</button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────
function App(){
  const [vista,setVista]=useState("login");
  const [usuario,setUsuario]=useState(null);

  // ✅ CORRECCIÓN CLAVE: cursoId se pasa correctamente desde login
  const handleStart=(nombre,cursoId)=>{
    if(nombre==="__MAESTRO__"){setVista("maestro");return;}
    setUsuario({nombre,cursoId});
    setVista("examen");
  };

  const handleEnviar=async resp=>{
    await fbGuardar(resp);
  };

  if(vista==="examen"&&usuario){
    const ExMap={comp1:ExamenC1,lab1:ExamenL1,prog4:ExamenP4,py5:ExamenPY,comp5:ExamenC5};
    const Ex=ExMap[usuario.cursoId];
    // ✅ Se pasa cursoId explícitamente a cada examen
    return Ex?<Ex nombre={usuario.nombre} cursoId={usuario.cursoId} onEnviar={handleEnviar}/>:null;
  }
  if(vista==="maestro")return<PanelMaestro onSalir={()=>setVista("login")}/>;
  return<Login onStart={handleStart}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
